<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accent":"#1a8c6e","font":"'DM Serif Display'","bg":"warm"}/*EDITMODE-END*/;
  const tweakState = {...TWEAK_DEFAULTS};

  function applyTweak(key, value) {
    tweakState[key] = value;
    if (key === 'accent') {
      document.documentElement.style.setProperty('--accent', value);
      document.documentElement.style.setProperty('--border-focus', value);
    }
    if (key === 'font') {
      document.documentElement.style.setProperty('--font-serif', value);
    }
    if (key === 'bg') {
      const bgs = { warm: 'oklch(0.975 0.008 75)', cool: 'oklch(0.975 0.006 230)', green: 'oklch(0.965 0.015 155)' };
      document.documentElement.style.setProperty('--bg', bgs[value]);
    }
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweakState }, '*');
  }

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>

// ── Utilities ──────────────────────────────────────────────────────────────

function validateIBAN(iban) {
  const cleaned = iban.replace(/\s/g, '').toUpperCase();
  if (!/^[A-Z]{2}\d{2}[A-Z0-9]{1,30}$/.test(cleaned)) return false;
  const rearranged = cleaned.slice(4) + cleaned.slice(0, 4);
  const numeric = rearranged.split('').map(c => isNaN(c) ? (c.charCodeAt(0) - 55).toString() : c).join('');
  let remainder = 0;
  for (let i = 0; i < numeric.length; i += 7) {
    remainder = parseInt(String(remainder) + numeric.slice(i, i + 7)) % 97;
  }
  return remainder === 1;
}

function formatIBAN(val) {
  return val.replace(/\s/g, '').toUpperCase().replace(/(.{4})/g, '$1 ').trim();
}

function today() {

// ── Signature Pad ──────────────────────────────────────────────────────────

function SignaturePad({ onSign, error }) {
  const canvasRef = useRef(null);
  const isDrawing = useRef(false);
  const [hasSignature, setHasSignature] = useState(false);
  const [focused, setFocused] = useState(false);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  };

  const startDraw = useCallback((e) => {
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const { x, y } = getPos(e, canvas);
    isDrawing.current = true;
    ctx.beginPath();
    ctx.moveTo(x, y);
  }, []);

  const draw = useCallback((e) => {
    if (!isDrawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const { x, y } = getPos(e, canvas);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'oklch(0.18 0.02 65)';
    ctx.lineTo(x, y);
    ctx.stroke();
  }, []);

  const endDraw = useCallback(() => {
    if (!isDrawing.current) return;
    isDrawing.current = false;
    const canvas = canvasRef.current;
    const dataUrl = canvas.toDataURL('image/png');
    setHasSignature(true);
    onSign(dataUrl);
  }, [onSign]);

  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHasSignature(false);
    onSign(null);
  };

  useEffect(() => {
    const canvas = canvasRef.current;
    // Set internal resolution
    canvas.width = 600;
    canvas.height = 180;
  }, []);

  return (
    <div>
      <div style={{
        border: `1.5px solid ${error ? 'var(--error)' : focused ? 'var(--border-focus)' : 'var(--border)'}`,
        borderRadius: 'var(--radius-sm)',
        background: hasSignature ? '#fffffe' : `repeating-linear-gradient(0deg, transparent, transparent 27px, oklch(0.88 0.01 75 / 0.4) 27px, oklch(0.88 0.01 75 / 0.4) 28px)`,
        position: 'relative', overflow: 'hidden',
        boxShadow: focused ? '0 0 0 3px oklch(0.52 0.13 165 / 0.1)' : 'none',
        transition: 'border-color 0.15s, box-shadow 0.15s',
      }}>
        {!hasSignature && (
          <div style={{
            position: 'absolute', inset: 0, display: 'flex',
            alignItems: 'center', justifyContent: 'center',
            pointerEvents: 'none', color: 'var(--ink-subtle)',
            fontSize: 13, fontStyle: 'italic'
          }}>
            Teken hier uw handtekening
          </div>
        )}
        <canvas
          ref={canvasRef}
          style={{ width: '100%', height: 180, display: 'block', cursor: 'crosshair', touchAction: 'none' }}
          onMouseDown={startDraw}
          onMouseMove={draw}
          onMouseUp={endDraw}
          onMouseLeave={endDraw}
          onTouchStart={startDraw}
          onTouchMove={draw}
          onTouchEnd={endDraw}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
        />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
        {hasSignature && <span style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 500 }}>✓ Handtekening vastgelegd</span>}
        {!hasSignature && <span />}
        <button
          type="button" onClick={clear}
          style={{
            fontSize: 12, color: 'var(--ink-muted)', background: 'none',
            border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)',
            padding: '4px 12px', cursor: 'pointer', fontFamily: 'var(--font-sans)',
          }}
        >Wissen</button>
      </div>
    </div>
  );
}

              {/* Submit */}

                color: 'white', border: 'none', borderRadius: 'var(--radius-sm)',

// ── Main Form ──────────────────────────────────────────────────────────────

function DonationForm({ user, onLogout }) {
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState({});

  const [form, setForm] = useState({
    naam: '', geboortedatum: '', adres: '', postcode_plaats: '',
    land: 'Nederland', telefoon: '', email: '',
    gift_type: 'periodiek',
    bedrag_maand: '', bedrag_eenmalig: '',
    startdatum: '',
    akkoord: false,
    iban: '', naam_rekening: '',
    handtekening: null,
    plaats: '', datum: today(), volledige_naam: '',
  });

  const set = (field, value) => {
    setForm(f => ({ ...f, [field]: value }));
    if (touched[field]) validate({ ...form, [field]: value }, field);
  };

  const touch = (field) => setTouched(t => ({ ...t, [field]: true }));

  const validate = (data = form, singleField = null) => {
    const e = { ...errors };
    const check = (field, cond, msg) => {
      if (singleField && field !== singleField) return;
      if (cond) { e[field] = msg; } else { delete e[field]; }
    };

    check('naam', !data.naam.trim(), 'Verplicht veld');
    check('geboortedatum', !data.geboortedatum, 'Verplicht veld');
    check('adres', !data.adres.trim(), 'Verplicht veld');
    check('postcode_plaats', !data.postcode_plaats.trim(), 'Verplicht veld');
    check('telefoon', !data.telefoon.trim(), 'Verplicht veld');
    check('email', !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email), 'Voer een geldig e-mailadres in');
    if (data.gift_type === 'periodiek') {
      check('bedrag_maand', !data.bedrag_maand || Number(data.bedrag_maand) <= 0, 'Voer een geldig bedrag in');
      check('startdatum', !data.startdatum, 'Verplicht veld');
    } else {
      check('bedrag_eenmalig', !data.bedrag_eenmalig || Number(data.bedrag_eenmalig) <= 0, 'Voer een geldig bedrag in');
    }
    check('akkoord', !data.akkoord, 'U dient akkoord te gaan');
    const cleanIBAN = data.iban.replace(/\s/g, '');
    check('iban', !cleanIBAN || !validateIBAN(cleanIBAN), 'Voer een geldig IBAN in');
    check('naam_rekening', !data.naam_rekening.trim(), 'Verplicht veld');
    check('handtekening', !data.handtekening, 'Handtekening is verplicht');
    check('plaats', !data.plaats.trim(), 'Verplicht veld');
    check('volledige_naam', !data.volledige_naam.trim(), 'Verplicht veld');

    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const generatePDF = async () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

    const margin = 20;
    let y = margin;
    const pageW = 210;
    const colW = pageW - margin * 2;

    const addLine = (text, opts = {}) => {
      const { size = 10, bold = false, color = [30, 30, 30], gap = 5 } = opts;
      doc.setFontSize(size);
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.setTextColor(...color);
      if (y > 270) { doc.addPage(); y = margin; }
      doc.text(text, margin, y);
      y += gap;
    };

    const addSection = (title) => {
      if (y > 250) { doc.addPage(); y = margin; }
      y += 4;
      doc.setFillColor(245, 250, 247);
      doc.rect(margin - 4, y - 5, colW + 8, 10, 'F');
      addLine(title, { size: 11, bold: true, color: [20, 110, 80], gap: 8 });
    };

    const field = (label, value) => {
      addLine(`${label}: ${value}`, { size: 10, gap: 6 });
    };

    // Header
    doc.setFillColor(26, 140, 110);
    doc.rect(0, 0, 210, 30, 'F');
    doc.setFontSize(14); doc.setFont('helvetica', 'bold'); doc.setTextColor(255, 255, 255);
    doc.text('Overeenkomst Periodieke Gift', margin, 16);
    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    doc.text('Nieuwe Moskee Enschede – HDV Selimiye / HDV Anadolu', margin, 23);
    y = 40;

    addSection('Gegevens schenker');
    field('Naam', form.naam);
    field('Geboortedatum', form.geboortedatum);
    field('Adres', form.adres);
    field('Postcode en woonplaats', form.postcode_plaats);
    field('Land', form.land);
    field('Telefoon', form.telefoon);
    field('E-mailadres', form.email);

    addSection('Gift');
    field('Type', form.gift_type === 'periodiek' ? 'Periodieke gift' : 'Eenmalige gift');
    if (form.gift_type === 'periodiek') {
      field('Bedrag per maand', `€ ${form.bedrag_maand}`);
      field('Startdatum', form.startdatum);
    } else {
      field('Bedrag', `€ ${form.bedrag_eenmalig}`);
    }

    addSection('Overeenkomsttekst');
    const agreementLines = [
      'Ik verklaar hierbij dat ik een periodieke gift doe aan HDV Selimiye /HDV Anadolu',
      'ten behoeve van de Nieuwe Moskee Enschede.',
      '',
      'Ik verbind mij om dit bedrag gedurende minimaal vijf (5) jaar te schenken,',
      'in gelijke periodieke termijnen.',
      '',
      'Deze gift eindigt uiterlijk bij het overlijden van de schenker.',
      '',
      'Deze overeenkomst geldt als schriftelijke vastlegging van een periodieke gift',
      'zoals bedoeld voor ANBI-instellingen.',
    ];
    agreementLines.forEach(l => addLine(l, { size: 9, color: [50, 50, 50], gap: 5 }));

    addSection('Betaalgegevens');
    field('IBAN', form.iban);
    field('Naam rekeninghouder', form.naam_rekening);

    addSection('Ondertekening');
    field('Plaats', form.plaats);
    field('Datum', form.datum);
    field('Naam', form.volledige_naam);

    if (form.handtekening) {
      y += 4;
      addLine('Handtekening:', { size: 9, bold: true, gap: 4 });
      doc.addImage(form.handtekening, 'PNG', margin, y, 80, 24);
      y += 30;
    }

    // Footer
    y += 10;
    doc.setDrawColor(200, 230, 215);
    doc.line(margin, y, 210 - margin, y);
    y += 6;
    addLine('HDV Selimiye / HDV Anadolu  ·  RSIN: 805141200  ·  IBAN: NL33ABNA0550144196', { size: 8, color: [100, 100, 100] });

    doc.save(`Overeenkomst_Periodieke_Gift_${form.naam.replace(/\s/g, '_')}.pdf`);
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setTouched(Object.fromEntries(Object.keys(form).map(k => [k, true])));
    if (!validate()) {
      setTimeout(() => {
        const firstErr = document.querySelector('[data-error="true"]');
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
      return;
    }
    setSubmitting(true);
    await new Promise(r => setTimeout(r, 1200));
    await generatePDF();
    setSubmitting(false);
    setSubmitted(true);
  };

  if (submitted) return <SuccessScreen naam={form.naam.split(' ')[0]} />;

  const inputProps = (field) => ({
    value: form[field],
    onChange: e => set(field, e.target.value),
    onBlur: () => touch(field),
    error: touched[field] ? errors[field] : undefined,
  });

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 60, background: 'var(--bg)' }}>
      {/* Header */}
      <div style={{
        background: 'var(--surface)', borderBottom: '1px solid var(--border)',
        padding: '0', position: 'sticky', top: 0, zIndex: 100,
        boxShadow: '0 1px 0 var(--border)',
      }}>
        <div style={{ maxWidth: 680, margin: '0 auto', padding: '16px 24px', display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round">
              <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>Nieuwe Moskee Enschede</div>
            <div style={{ fontSize: 11, color: 'var(--ink-subtle)' }}>HDV Selimiye / HDV Anadolu · ANBI</div>
          </div>
          {user && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{user.email}</span>
              <button onClick={onLogout} style={{
                fontSize: 12, padding: '5px 12px', border: '1px solid var(--border)',
                borderRadius: 'var(--radius-sm)', background: 'var(--bg)', color: 'var(--ink-muted)',
                cursor: 'pointer', fontFamily: 'var(--font-sans)',
              }}>Uitloggen</button>
            </div>
          )}
        </div>
      </div>

      <div style={{ maxWidth: 680, margin: '0 auto', padding: '40px 20px 0' }}>
        {/* Hero */}
        <div style={{ marginBottom: 32 }}>
          <h1 style={{
            fontFamily: 'var(--font-serif)', fontSize: 'clamp(26px, 5vw, 36px)',
            fontWeight: 400, color: 'var(--ink)', lineHeight: 1.25, marginBottom: 12,
          }}>
            Overeenkomst<br/>
            <span style={{ color: 'var(--accent)' }}>Periodieke Gift</span>
          </h1>
          <p style={{ color: 'var(--ink-muted)', maxWidth: 480, lineHeight: 1.7, fontSize: 15 }}>
            Dit formulier legt een bindende schenkingsovereenkomst vast. Na ondertekening ontvangt u een bevestiging per e-mail met een PDF-kopie.
          </p>
        </div>

        <form onSubmit={handleSubmit} noValidate>

          {/* Section 1: Donor details */}
          <SectionCard number="1" title="Gegevens schenker">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 16px' }}>
              <div style={{ gridColumn: '1 / -1' }}>
                <FormField label="Voor- en achternaam" required error={touched.naam && errors.naam}>
                  <Input placeholder="Jan de Vries" {...inputProps('naam')} />
                </FormField>
              </div>
              <FormField label="Geboortedatum" required error={touched.geboortedatum && errors.geboortedatum}>
                <Input type="date" {...inputProps('geboortedatum')} />
              </FormField>
              <FormField label="Telefoonnummer" required error={touched.telefoon && errors.telefoon}>
                <Input type="tel" placeholder="+31 6 12345678" {...inputProps('telefoon')} />
              </FormField>
              <div style={{ gridColumn: '1 / -1' }}>
                <FormField label="Adres" required error={touched.adres && errors.adres}>
                  <Input placeholder="Straatnaam 12" {...inputProps('adres')} />
                </FormField>
              </div>
              <FormField label="Postcode en woonplaats" required error={touched.postcode_plaats && errors.postcode_plaats}>
                <Input placeholder="7511 AB Enschede" {...inputProps('postcode_plaats')} />
              </FormField>
              <FormField label="Land" required>
                <Select value={form.land} onChange={e => set('land', e.target.value)}>
                  {['Nederland','België','Duitsland','Turkije','Marokko','Anders'].map(l => (
                    <option key={l}>{l}</option>
                  ))}
                </Select>
              </FormField>
              <div style={{ gridColumn: '1 / -1' }}>
                <FormField label="E-mailadres" required error={touched.email && errors.email}>
                  <Input type="email" placeholder="jan@voorbeeld.nl" {...inputProps('email')} />
                </FormField>
              </div>
            </div>
          </SectionCard>

          {/* Section 2: Gift type */}
          <SectionCard number="2" title="Type gift">
            <RadioCard value="periodiek" checked={form.gift_type === 'periodiek'} onChange={v => set('gift_type', v)}
              label="Periodieke gift" description="Minimaal 5 jaar – aftrekbaar voor de inkomstenbelasting" />
            <RadioCard value="eenmalig" checked={form.gift_type === 'eenmalig'} onChange={v => set('gift_type', v)}
              label="Eenmalige gift" description="Eenmalige bijdrage" />

            {/* Conditional: Periodic */}
            <div style={{
              overflow: 'hidden', maxHeight: form.gift_type === 'periodiek' ? 300 : 0,
              opacity: form.gift_type === 'periodiek' ? 1 : 0,
              transition: 'max-height 0.3s ease, opacity 0.25s ease',
              marginTop: form.gift_type === 'periodiek' ? 16 : 0,
            }}>
              <div style={{ padding: '20px', background: 'var(--accent-light)', borderRadius: 'var(--radius-sm)', border: '1px solid oklch(0.52 0.13 165 / 0.2)' }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 16px' }}>
                  <FormField label="Bedrag per maand (€)" required error={touched.bedrag_maand && errors.bedrag_maand}>
                    <Input type="number" min="1" placeholder="25" {...inputProps('bedrag_maand')} />
                  </FormField>
                  <FormField label="Startdatum" required error={touched.startdatum && errors.startdatum}>
                    <Input type="date" {...inputProps('startdatum')} />
                  </FormField>
                </div>
              </div>
            </div>

            {/* Conditional: One-time */}
            <div style={{
              overflow: 'hidden', maxHeight: form.gift_type === 'eenmalig' ? 150 : 0,
              opacity: form.gift_type === 'eenmalig' ? 1 : 0,
              transition: 'max-height 0.3s ease, opacity 0.25s ease',
              marginTop: form.gift_type === 'eenmalig' ? 16 : 0,
            }}>
              <div style={{ padding: '20px', background: 'var(--bg)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}>
                <FormField label="Bedrag (€)" required error={touched.bedrag_eenmalig && errors.bedrag_eenmalig}>
                  <Input type="number" min="1" placeholder="100" {...inputProps('bedrag_eenmalig')} />
                </FormField>
              </div>
            </div>
          </SectionCard>

          {/* Section 3: Agreement text */}
          <SectionCard number="3" title="Overeenkomsttekst">
            <div style={{
              background: 'var(--bg)', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', padding: '20px 22px', marginBottom: 20,
              borderLeft: '3px solid var(--accent)',
            }}>
              <p style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--ink)', fontStyle: 'italic' }}>
                "Ik verklaar hierbij dat ik een periodieke gift doe aan HDV Selimiye / HDV Anadolu ten behoeve van de Nieuwe Moskee Enschede.
              </p>
              <p style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--ink)', marginTop: 12, fontStyle: 'italic' }}>
                Ik verbind mij om dit bedrag gedurende minimaal vijf (5) jaar te schenken, in gelijke periodieke termijnen.
              </p>
              <p style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--ink)', marginTop: 12, fontStyle: 'italic' }}>
                Deze gift eindigt uiterlijk bij het overlijden van de schenker.
              </p>
              <p style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--ink)', marginTop: 12, fontStyle: 'italic' }}>
                Deze overeenkomst geldt als schriftelijke vastlegging van een periodieke gift zoals bedoeld voor ANBI-instellingen."
              </p>
            </div>

            <label style={{
              display: 'flex', alignItems: 'flex-start', gap: 12, cursor: 'pointer',
              padding: '14px 16px',
              border: `1.5px solid ${touched.akkoord && errors.akkoord ? 'var(--error)' : form.akkoord ? 'var(--accent)' : 'var(--border)'}`,
              borderRadius: 'var(--radius-sm)',
              background: form.akkoord ? 'var(--accent-light)' : touched.akkoord && errors.akkoord ? 'var(--error-light)' : 'var(--surface)',
              transition: 'all 0.15s',
            }} data-error={!!(touched.akkoord && errors.akkoord)}>
              <div style={{
                width: 18, height: 18, borderRadius: 4, flexShrink: 0, marginTop: 1,
                border: `2px solid ${touched.akkoord && errors.akkoord ? 'var(--error)' : form.akkoord ? 'var(--accent)' : 'var(--border)'}`,
                background: form.akkoord ? 'var(--accent)' : 'transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all 0.15s',
              }}>
                {form.akkoord && (
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <polyline points="1.5 5.5 4 8 8.5 2" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </div>
              <div>
                <span style={{ fontSize: 14, fontWeight: 500, color: 'var(--ink)' }}>Ik ga akkoord met deze overeenkomst</span>
                {touched.akkoord && errors.akkoord && (
                  <p style={{ fontSize: 12, color: 'var(--error)', marginTop: 3 }}>{errors.akkoord}</p>
                )}
              </div>
              <input type="checkbox" checked={form.akkoord} onChange={e => { set('akkoord', e.target.checked); touch('akkoord'); }}
                style={{ position: 'absolute', opacity: 0, pointerEvents: 'none' }} />
            </label>
          </SectionCard>

          {/* Section 4: Payment */}
          <SectionCard number="4" title="Betaalgegevens">
            <FormField label="IBAN" required error={touched.iban && errors.iban} hint="Bijv. NL91 ABNA 0417 1643 00">
              <Input
                placeholder="NL91 ABNA 0417 1643 00"
                value={form.iban}
                onChange={e => set('iban', formatIBAN(e.target.value))}
                onBlur={() => touch('iban')}
                error={touched.iban && errors.iban}
                maxLength={34}
              />
            </FormField>
            <FormField label="Naam rekeninghouder" required error={touched.naam_rekening && errors.naam_rekening}>
              <Input placeholder="Jan de Vries" {...inputProps('naam_rekening')} />
            </FormField>
          </SectionCard>

          {/* Section 5: Signature */}
          <SectionCard number="5" title="Digitale ondertekening">
            <p style={{ fontSize: 14, color: 'var(--ink-muted)', marginBottom: 20, lineHeight: 1.6 }}>
              Door hieronder te ondertekenen bevestigt u deze overeenkomst digitaal.
            </p>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 16px' }}>
              <FormField label="Plaats" required error={touched.plaats && errors.plaats}>
                <Input placeholder="Enschede" {...inputProps('plaats')} />
              </FormField>
              <FormField label="Datum" required>
                <Input type="date" value={form.datum} onChange={e => set('datum', e.target.value)} />
              </FormField>
              <div style={{ gridColumn: '1 / -1' }}>
                <FormField label="Volledige naam" required error={touched.volledige_naam && errors.volledige_naam}>
                  <Input placeholder="Jan de Vries" {...inputProps('volledige_naam')} />
                </FormField>
              </div>
            </div>

            <FormField label="Handtekening" required error={touched.handtekening && errors.handtekening}>
              <SignaturePad
                onSign={sig => { set('handtekening', sig); if (sig) touch('handtekening'); }}
                error={touched.handtekening && errors.handtekening}
              />
            </FormField>
          </SectionCard>

          {/* Footer org info */}
          <div style={{
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: 'var(--radius)', padding: '18px 24px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            flexWrap: 'wrap', gap: 12, marginBottom: 20,
          }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>HDV Selimiye / HDV Anadolu</div>
              <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginTop: 2 }}>RSIN: 805141200</div>
            </div>
            <div style={{ fontSize: 12, color: 'var(--ink-muted)', fontFamily: 'monospace', letterSpacing: '0.03em' }}>
              NL33 ABNA 0550 1441 96
            </div>
          </div>

          {/* Submit */}
          <button
            type="submit"
            disabled={submitting}
            style={{
              width: '100%', padding: '16px 24px',
              background: submitting ? 'var(--ink-subtle)' : 'var(--accent)',
              color: 'white', border: 'none', borderRadius: 'var(--radius)',
              fontFamily: 'var(--font-sans)', fontSize: 16, fontWeight: 600,
              cursor: submitting ? 'not-allowed' : 'pointer',
              transition: 'all 0.2s', letterSpacing: '0.01em',
              boxShadow: submitting ? 'none' : '0 4px 16px oklch(0.52 0.13 165 / 0.3)',
            }}
            onMouseOver={e => { if (!submitting) e.target.style.background = 'var(--accent-dark)'; }}
            onMouseOut={e => { if (!submitting) e.target.style.background = 'var(--accent)'; }}
          >
            {submitting ? (
              <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                <span style={{
                  width: 18, height: 18, border: '2px solid rgba(255,255,255,0.3)',
                  borderTopColor: 'white', borderRadius: '50%',
                  display: 'inline-block', animation: 'spin 0.8s linear infinite',
                }} />
                Overeenkomst verwerken…
              </span>
            ) : 'Overeenkomst ondertekenen en indienen →'}
          </button>

          <p style={{ textAlign: 'center', fontSize: 12, color: 'var(--ink-subtle)', marginTop: 14, marginBottom: 40 }}>
            Na het indienen ontvangt u een PDF per e-mail ter bevestiging.
          </p>
        </form>
      </div>

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
        ::placeholder { color: var(--ink-subtle); }
        * { -webkit-tap-highlight-color: transparent; }
        @media (max-width: 480px) {
          .grid-2col { grid-template-columns: 1fr !important; }
        }
      `}</style>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);

  // Check persisted session on mount
  useEffect(() => {
    const saved = sessionStorage.getItem('nm_auth');
    if (saved) setUser(JSON.parse(saved));
  }, []);

  if (!user) return <LoginScreen onLogin={setUser} />;
  return <DonationForm user={user} onLogout={() => { sessionStorage.removeItem('nm_auth'); setUser(null); }} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
